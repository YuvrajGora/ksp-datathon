<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSP Crime Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: white; }
        
        .navbar {
            background: #161b22;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #f85149;
        }
        .navbar h1 { font-size: 20px; color: #f85149; }
        .navbar span { font-size: 13px; color: #8b949e; }

        .stats {
            display: flex;
            gap: 20px;
            padding: 30px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 25px;
            flex: 1;
            text-align: center;
        }
        .stat-card h2 { font-size: 40px; color: #f85149; }
        .stat-card p { color: #8b949e; margin-top: 5px; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 30px 30px 30px;
        }
        .chart-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 15px;
        }
        .chart-full {
            padding: 0 30px 30px 30px;
        }
        .chart-full .chart-card { width: 100%; }

        .section-title {
            font-size: 18px;
            margin: 0 30px 15px 30px;
            color: #f85149;
            border-left: 4px solid #f85149;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>🚔 KSP Crime Analytics</h1>
        <span>Karnataka State Police — SCRB Intelligence Dashboard</span>
        <div style="margin-left: auto; display: flex; gap: 15px;">
            <a href="/" style="color: #f85149; text-decoration: none;">📊 Dashboard</a>
            <a href="/map" style="color: #8b949e; text-decoration: none;">🗺️ Crime Map</a>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h2>12,483</h2>
            <p>Total Crimes Recorded</p>
        </div>
        <div class="stat-card">
            <h2>30</h2>
            <p>Districts Monitored</p>
        </div>
        <div class="stat-card">
            <h2>1,100+</h2>
            <p>Police Stations</p>
        </div>
        <div class="stat-card">
            <h2>87%</h2>
            <p>Case Resolution Rate</p>
        </div>
    </div>

    <p class="section-title">📈 Monthly Crime Trends</p>
    <div class="chart-full">
        <div class="chart-card">
            <div id="chart_trends"></div>
        </div>
    </div>

    <p class="section-title">📊 District & Crime Analysis</p>
    <div class="charts-grid">
        <div class="chart-card">
            <div id="chart_district"></div>
        </div>
        <div class="chart-card">
            <div id="chart_types"></div>
        </div>
    </div>

    <script>
        var trends = {{ chart_trends | safe }};
        var district = {{ chart_district | safe }};
        var types = {{ chart_types | safe }};

        Plotly.newPlot('chart_trends', trends.data, trends.layout);
        Plotly.newPlot('chart_district', district.data, district.layout);
        Plotly.newPlot('chart_types', types.data, types.layout);
    </script>

</body>
</html>
